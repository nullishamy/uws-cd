- name: Ensure staging instances are running and inventory is updated
  hosts: localhost
  gather_facts: no
  vars_files:
    - ./secrets/aws-cli.yml
    - ./secrets/duck.yml
  module_defaults:
    group/aws:
      aws_access_key: '{{ vault_aws_access_key }}'
      aws_secret_key: '{{ vault_aws_secret_key }}'
      session_token: '{{ vault_aws_session_token }}'
  vars:
    instance_name: coursework-2-running-app
    group: ec2_staging
    region: us-east-1

  tasks:
    - name: Gather facts to check if the staging instance already exists
      ec2_instance_info:
        region: "{{ region }}"
        filters:
          instance-state-name: running
          tag:Name: "{{ instance_name }}"
      register: ec2_exists

    - name: Fail if no running instances are found
      fail:
        msg: "No running staging instances found. Please provision the app vm."
      when: ec2_exists.instances | length == 0

    - name: Update inventory with dynamic public IPs
      add_host:
        name: "{{ item.public_ip_address }}"
        groups: "{{ group }}"
      loop: "{{ ec2_exists.instances }}"
      when: item.public_ip_address is defined

- name: Deploy Application on app instance
  vars:
    ansible_user: ubuntu
    group: ec2_staging
    app_version: "{{ lookup('env', 'APP_VERSION') }}"
  hosts: "{{ group }}"
  become: yes
  become_method: sudo

  tasks:
    - name: Tear down existing docker-compose app
      community.docker.docker_compose_v2:
        project_src: /home/ubuntu
        state: absent
      ignore_errors: yes

    - name: Prune everything on docker
      community.docker.docker_prune:
        containers: true
        images: true
        networks: true
        volumes: true
        builder_cache: true

    - name: Copy docker-compose file from the parent directory
      template:
        src: ./docker-compose-staging.yml
        dest: /home/ubuntu/docker-compose.yml
        mode: '0644'

    - name: Copy nginx config file
      copy:
        src: ./nginx.conf
        dest: /home/ubuntu/nginx.conf
        mode: '0644'

    - name: Start docker compose app
      community.docker.docker_compose_v2:
        project_src: /home/ubuntu
        state: present
        build: never
